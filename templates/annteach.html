<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Announcing Section | Broadcast Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='annteach.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>

    <main class="main-container">
        <section class="announcement-card">
            <header class="card-header">
                <h2>📢 Broadcast Portal</h2>
                <p>Send announcements to the right audience instantly.</p>
            </header>

            <div class="layout-flex">
                <div class="form-section">

                    <!-- Title -->
                    <div class="input-group">
                        <label for="announcementTitle">Announcement Title</label>
                        <input type="text" id="announcementTitle"
                            placeholder="e.g. Holiday Notice, Exam Schedule...">
                    </div>

                    <!-- Receiver Role -->
                    <div class="input-group">
                        <label for="role">Select Receiver Role</label>
                        <select id="role" onchange="toggleStudentFields()">
                            <option value="all">📣 For All</option>
                            <option value="student">🎓 Students</option>
                            <option value="teacher">👨‍🏫 Teachers</option>
                            <option value="parent">👪 Parents</option>
                        </select>
                    </div>

                    <!-- Student-only: Standard & Section -->
                    <div id="student-extras" class="hidden-fields">
                        <div class="grid-inputs">
                            <div class="input-group">
                                <label>Standard</label>
                                <select id="ann_standard">
                                    <option value="8th">8th Standard</option>
                                    <option value="9th">9th Standard</option>
                                    <option value="10th">10th Standard</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Section</label>
                                <select id="ann_section">
                                    <option value="A">Section A</option>
                                    <option value="B">Section B</option>
                                    <option value="C">Section C</option>
                                    <option value="D">Section D</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Message -->
                    <div class="input-group">
                        <label>Your Message</label>
                        <textarea id="messageContent"
                            placeholder="Type your announcement here..."></textarea>
                    </div>

                    <!-- From Teacher box -->
                    <div class="from-teacher-box">
                        <span class="from-label">📌 Broadcasting as:</span>
                        <span class="from-name" id="fromTeacherName">Loading...</span>
                    </div>

                    <!-- Broadcast Button -->
                    <button class="btn-broadcast" onclick="submitAnnouncement()">
                        <i class="ph ph-broadcast"></i> Broadcast Message
                    </button>

                    <!-- Success Message -->
                    <div id="successMsg" class="success-msg" style="display:none;">
                        ✅ Announcement broadcasted successfully!
                    </div>

                </div>

                <aside class="emoji-sidebar">
                    <div class="emoji-item" title="Education"><span class="emoji">📚</span></div>
                    <div class="emoji-item" title="Notes"><span class="emoji">📝</span></div>
                    <div class="emoji-item" title="Computing"><span class="emoji">💻</span></div>
                    <div class="emoji-item" title="Announcement"><span class="emoji">😊</span></div>
                    <div class="emoji-item" title="Goals"><span class="emoji">🎯</span></div>
                </aside>
            </div>
        </section>
    </main>

    <script>

        // Auto fill teacher name from localStorage
        const teacherName = localStorage.getItem("name") || "Teacher";
        const teacherId   = localStorage.getItem("user_id");
        document.getElementById("fromTeacherName").innerText = teacherName;

        function toggleStudentFields() {
            const role   = document.getElementById("role").value;
            const extras = document.getElementById("student-extras");
            if (role === "student") {
                extras.classList.add("visible");
            } else {
                extras.classList.remove("visible");
            }
        }

        async function submitAnnouncement() {
            const title   = document.getElementById("announcementTitle").value.trim();
            const role    = document.getElementById("role").value;
            const message = document.getElementById("messageContent").value.trim();

            if (!title) {
                alert("Please enter an announcement title.");
                return;
            }
            if (!message) {
                alert("Please type your message.");
                return;
            }

            // Build target_section for students
            let target_section = null;
            if (role === "student") {
                const std = document.getElementById("ann_standard").value;
                const sec = document.getElementById("ann_section").value;
                target_section = `${std}-${sec}`;
            }

            // Append teacher signature
            const fullMessage = `${message}\n\n— ${teacherName}`;

            try {
                const response = await fetch("/add_announcement", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        title:          title,
                        content:        fullMessage,
                        posted_by:      teacherId,
                        target_role:    role,
                        target_section: target_section
                    })
                });

                const data = await response.json();

                if (data.status) {
                    document.getElementById("successMsg").style.display = "block";
                    document.getElementById("announcementTitle").value  = "";
                    document.getElementById("messageContent").value     = "";
                    document.getElementById("role").value               = "all";
                    document.getElementById("student-extras").classList.remove("visible");

                    setTimeout(() => {
                        document.getElementById("successMsg").style.display = "none";
                    }, 3000);
                }

            } catch (err) {
                alert("Server error. Please try again.");
                console.error(err);
            }
        }
        // Emoji click to insert into message
        document.querySelectorAll(".emoji-item").forEach(item => {
            item.style.cursor = "pointer";
            item.addEventListener("click", function() {
                const emoji = this.querySelector(".emoji").innerText;
                const textarea = document.getElementById("messageContent");
                const pos = textarea.selectionStart;
                const text = textarea.value;
                textarea.value = text.slice(0, pos) + emoji + text.slice(pos);
                textarea.selectionStart = pos + emoji.length;
                textarea.selectionEnd = pos + emoji.length;
                textarea.focus();

                // Flash effect on click
                this.style.transform = "scale(1.3)";
                setTimeout(() => this.style.transform = "scale(1)", 200);
            });
        });

    </script>

    </script>
</body>
</html>
