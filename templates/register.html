<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register | AET School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:#0f1f3d; --blue:#1a3a6b; --accent:#c8932a; --accent-lt:#e8b44a;
  --gold-glow:rgba(200,147,42,0.25); --white:#ffffff;
  --text-dark:#1a1a2e; --text-mid:#4a5568; --text-light:#9aa5b4;
  --border:#dde3ef; --input-bg:#f4f6fb;
  --card-shadow:0 32px 80px rgba(10,20,50,0.35);
  --radius:14px; --radius-sm:8px;
}
html { font-family:'DM Sans',sans-serif; overflow-x:hidden; overflow-y:scroll; -webkit-text-size-adjust:100%; }
body { margin:0; display:flex; justify-content:center; align-items:flex-start; font-family:'DM Sans',sans-serif; background:var(--navy); min-height:100vh; overflow-x:hidden; position:relative; }
.bg-orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; animation:orbFloat 12s ease-in-out infinite; }
.orb-1 { width:500px; height:500px; background:radial-gradient(circle,rgba(26,58,107,0.7),transparent 70%); top:-150px; left:-150px; }
.orb-2 { width:400px; height:400px; background:radial-gradient(circle,rgba(200,147,42,0.2),transparent 70%); bottom:-100px; right:-100px; animation-delay:4s; }
.orb-3 { width:300px; height:300px; background:radial-gradient(circle,rgba(26,58,107,0.5),transparent 70%); top:50%; left:60%; animation-delay:8s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-20px) scale(1.05)} 66%{transform:translate(-20px,30px) scale(0.95)} }
.page-wrapper { width:100%; max-width:100%; margin:0 auto; position:relative; z-index:1; padding:20px 12px; }
.register-card { background:var(--white); border-radius:20px; box-shadow:var(--card-shadow); padding:25px 24px; border-top:4px solid var(--accent); animation:cardReveal 0.7s cubic-bezier(0.22,1,0.36,1) both; position:relative; overflow:hidden; width:100%; max-width:500px; margin:0 auto; }
.register-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent-lt),var(--accent)); background-size:200% 100%; animation:shimmer 3s linear infinite; }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes cardReveal { from{opacity:0;transform:translateY(40px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
.anim-field { animation:fieldSlideIn 0.5s cubic-bezier(0.22,1,0.36,1) both; animation-delay:calc(var(--i) * 0.07s); }
@keyframes fieldSlideIn { from{opacity:0;transform:translateX(-18px)} to{opacity:1;transform:translateX(0)} }
.card-header { text-align:center; margin-bottom:28px; }
.logo-wrap { position:relative; display:inline-block; margin-bottom:14px; }
.logo { font-size:44px; position:relative; z-index:1; animation:logoBounce 2s ease-in-out infinite; }
@keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.logo-ring { position:absolute; width:72px; height:72px; border-radius:50%; border:2px solid var(--accent); top:50%; left:50%; transform:translate(-50%,-50%); animation:ringPulse 2.5s ease-in-out infinite; }
@keyframes ringPulse { 0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.6} 50%{transform:translate(-50%,-50%) scale(1.2);opacity:0.2} }
.card-header h2 { font-family:'Playfair Display',serif; font-size:26px; color:var(--text-dark); font-weight:700; margin-bottom:6px; }
.subtitle { font-size:12.5px; color:var(--text-light); }
.header-line { width:50px; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent-lt)); border-radius:2px; margin:14px auto 0; }
.field-group { margin-bottom:16px; width:100%; min-width:0; }
.field-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
label { display:block; margin-bottom:7px; color:var(--text-dark); font-weight:600; font-size:12.5px; letter-spacing:0.2px; text-transform:uppercase; }
.required { color:#e53e3e; }
.input-wrap { position:relative; display:flex; align-items:center; }
.input-icon { position:absolute; left:13px; font-size:15px; pointer-events:none; z-index:1; opacity:0.75; }
input, select { width:100%; min-width:0; padding:11px 14px 11px 40px; border:1.5px solid var(--border); border-radius:var(--radius-sm); font-size:16px; font-family:'DM Sans',sans-serif; color:var(--text-dark); background:var(--input-bg); outline:none; transition:border-color 0.25s,box-shadow 0.25s,background 0.25s; -webkit-appearance:none; appearance:none; }
input:focus, select:focus { border-color:var(--accent); background:var(--white); box-shadow:0 0 0 3px var(--gold-glow); }
input::placeholder { color:var(--text-light); font-size:14px; }
select { cursor:pointer; }
.select-wrap::after { content:'▾'; position:absolute; right:13px; color:var(--text-mid); pointer-events:none; font-size:13px; }
.role-tabs { display:flex; gap:8px; margin-bottom:4px; }
.role-tab { flex:1; padding:10px 8px; border:1.5px solid var(--border); border-radius:var(--radius-sm); background:var(--input-bg); color:var(--text-mid); font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.22s; text-align:center; min-height:44px; }
.role-tab:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }
.role-tab.active { background:var(--navy); border-color:var(--navy); color:var(--white); box-shadow:0 4px 14px rgba(15,31,61,0.3); transform:translateY(-2px); }
.special-fields-box { background:linear-gradient(135deg,#f0f5ff,#faf8f2); border:1.5px solid #d4e0ff; border-left:3px solid var(--accent); border-radius:var(--radius-sm); padding:18px 16px; margin-bottom:16px; }
.section-badge { display:inline-block; font-size:12px; font-weight:700; color:var(--blue); background:linear-gradient(135deg,#e8eeff,#fef3dc); border:1px solid #c8d8ff; border-radius:20px; padding:4px 12px; margin-bottom:14px; }
.slide-in { animation:slideDown 0.35s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.password-wrapper input { padding-right:48px; }
.eye-btn { position:absolute; right:12px; background:none; border:none; cursor:pointer; color:var(--text-light); padding:8px; display:flex; align-items:center; z-index:2; }
.eye-btn:hover { color:var(--accent); }
.strength-bar { height:4px; background:var(--border); border-radius:4px; margin-top:8px; overflow:hidden; }
.strength-fill { height:100%; width:0%; border-radius:4px; transition:width 0.4s,background 0.4s; }
.strength-text { font-size:11px; font-weight:600; margin-top:4px; text-align:right; min-height:16px; }
button[type="submit"] { width:100%; padding:14px; background:linear-gradient(135deg,var(--navy),var(--blue)); color:var(--white); border:none; border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; margin-top:8px; position:relative; overflow:hidden; -webkit-appearance:none; }
button[type="submit"]::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,var(--accent),var(--accent-lt)); opacity:0; transition:opacity 0.3s; }
button[type="submit"]:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(15,31,61,0.35); }
button[type="submit"]:hover::after { opacity:1; }
button[type="submit"] span { position:relative; z-index:1; }
button[type="submit"]:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
.btn-loader { display:inline-flex; gap:5px; align-items:center; }
.dot { width:7px; height:7px; background:white; border-radius:50%; animation:dotBounce 1.2s ease-in-out infinite; display:inline-block; }
.dot:nth-child(2){animation-delay:.2s} .dot:nth-child(3){animation-delay:.4s}
@keyframes dotBounce { 0%,80%,100%{transform:scale(0.8);opacity:0.5} 40%{transform:scale(1.2);opacity:1} }
.login-strip { display:flex; align-items:center; justify-content:center; flex-wrap:wrap; gap:4px; margin-top:16px; padding:14px 20px; background:#eff6ff; border:1.5px solid #bfdbfe; border-radius:12px; font-size:14px; color:#374151; text-align:center; }
.login-strip a { color:#2563eb; font-weight:600; text-decoration:none; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); padding:13px 24px; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500; opacity:0; transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1); z-index:9999; box-shadow:0 8px 30px rgba(0,0,0,0.2); max-width:calc(100vw - 32px); text-align:center; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
.toast-error   { background:#1a1a1a; color:#ff6b6b; border-left:4px solid #ff6b6b; }
.toast-success { background:#1a1a1a; color:#51cf66; border-left:4px solid #51cf66; }
@keyframes popIn { from{transform:scale(0.85);opacity:0} to{transform:scale(1);opacity:1} }
.popup-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); justify-content:center; align-items:center; z-index:9999; backdrop-filter:blur(4px); padding:20px; }
.popup-overlay.open { display:flex; }
.popup-box { background:white; border-radius:16px; padding:36px 32px; max-width:380px; width:100%; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,0.25); animation:popIn 0.25s ease; }
.popup-box h3 { margin:0 0 8px; font-size:20px; color:#111; }
.popup-body { margin:0 0 6px; color:#374151; font-size:15px; }
.popup-name { margin:0 0 4px; font-weight:700; font-size:17px; color:#2563eb; }
.popup-role { margin:0 0 16px; font-size:13px; color:#6b7280; }
.popup-note { margin:0 0 24px; font-size:13px; color:#9ca3af; }
.popup-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
.popup-btn-primary { background:#2563eb; color:white; border:none; padding:11px 24px; border-radius:8px; cursor:pointer; font-weight:600; font-size:14px; }
.popup-btn-secondary { background:#f3f4f6; color:#374151; border:none; padding:11px 20px; border-radius:8px; cursor:pointer; font-size:14px; }
@media (max-width:768px) { .field-row{grid-template-columns:1fr} .role-tabs{flex-direction:column} .role-tab{width:100%} }
@media (max-width:480px) { .page-wrapper{padding:14px 10px 60px} .register-card{padding:22px 14px 20px} .field-row{grid-template-columns:1fr;gap:0} .role-tabs{gap:5px} .role-tab{font-size:12px;padding:10px 6px} .bg-orb{display:none} input,select{font-size:16px !important} }
</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="popup-overlay" id="existingAccountPopup">
  <div class="popup-box">
    <div style="font-size:52px;margin-bottom:8px;">👋</div>
    <h3>Welcome back!</h3>
    <p class="popup-body">Account found for</p>
    <p class="popup-name" id="existingName"></p>
    <p class="popup-role" id="existingRole"></p>
    <p class="popup-note">Your account already exists. Go to your dashboard.</p>
    <div class="popup-btns">
      <button id="dashboardBtn" class="popup-btn-primary" onclick="goToDashboard()">Open My Dashboard →</button>
      <button class="popup-btn-secondary" onclick="closeExistingPopup()">Dismiss</button>
    </div>
  </div>
</div>

<div class="page-wrapper">
  <div class="register-card">
    <div class="card-header">
      <div class="logo-wrap"><div class="logo-ring"></div><div class="logo">🎓</div></div>
      <h2>Create Account</h2>
      <p class="subtitle">AET School of Excellence — Management System</p>
      <div class="header-line"></div>
    </div>

    <form id="registerForm" autocomplete="off">
      <input type="text" style="display:none;" aria-hidden="true">
      <input type="password" style="display:none;" aria-hidden="true">

      <div class="field-group anim-field" style="--i:1">
        <label>Full Name <span class="required">*</span></label>
        <div class="input-wrap"><span class="input-icon">👤</span>
          <input type="text" id="name" placeholder="Enter your full name" autocomplete="off" required>
        </div>
      </div>

      <div class="field-group anim-field" style="--i:2">
        <label>Register As <span class="required">*</span></label>
        <div class="role-tabs">
          <button type="button" class="role-tab active" data-role="student" onclick="selectRole('student')">🎒 Student</button>
          <button type="button" class="role-tab" data-role="teacher" onclick="selectRole('teacher')">📖 Teacher</button>
          <button type="button" class="role-tab" data-role="parent" onclick="selectRole('parent')">👨‍👩‍👦 Parent</button>
        </div>
        <select id="role" style="display:none;">
          <option value="student">Student</option>
          <option value="teacher">Teacher</option>
          <option value="parent">Parent</option>
        </select>
      </div>

      <div id="parentNamesBlock" class="field-row anim-field" style="--i:3">
        <div class="field-group">
          <label>Father's Name</label>
          <div class="input-wrap"><span class="input-icon">👨</span>
            <input type="text" id="father_name" placeholder="Father's name" autocomplete="off">
          </div>
        </div>
        <div class="field-group">
          <label>Mother's Name</label>
          <div class="input-wrap"><span class="input-icon">👩</span>
            <input type="text" id="mother_name" placeholder="Mother's name" autocomplete="off">
          </div>
        </div>
      </div>

      <div class="field-group anim-field" style="--i:4">
        <label>Phone Number <span class="required">*</span></label>
        <div class="input-wrap"><span class="input-icon">📱</span>
          <input type="tel" id="phone" placeholder="10-digit phone number" maxlength="10" autocomplete="off" required inputmode="numeric">
        </div>
      </div>

      <div class="field-group anim-field" style="--i:5">
        <label>Email Address <span class="required">*</span></label>
        <div class="input-wrap"><span class="input-icon">✉️</span>
          <input type="email" id="email" placeholder="Enter your email" autocomplete="off" required inputmode="email">
        </div>
      </div>

      <div id="studentFields" class="special-fields-box anim-field" style="--i:6">
        <div class="section-badge">📚 Student Details</div>
        <div class="field-group">
          <label>Roll Number <span class="required">*</span></label>
          <div class="input-wrap"><span class="input-icon">🔢</span>
            <input type="text" id="roll_number" placeholder="e.g. 101" autocomplete="off" inputmode="numeric">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label>Standard <span class="required">*</span></label>
            <div class="input-wrap select-wrap"><span class="input-icon">🏫</span>
              <select id="standard">
                <option value="8th">8th Standard</option>
                <option value="9th">9th Standard</option>
                <option value="10th">10th Standard</option>
              </select>
            </div>
          </div>
          <div class="field-group">
            <label>Section <span class="required">*</span></label>
            <div class="input-wrap select-wrap"><span class="input-icon">🔤</span>
              <select id="section">
                <option value="A">Section A</option>
                <option value="B">Section B</option>
                <option value="C">Section C</option>
                <option value="D">Section D</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div id="parentFields" style="display:none;" class="special-fields-box anim-field" style="--i:6">
        <div class="section-badge">👪 Child Details</div>
        <div class="field-group">
          <label>Child's Full Name <span class="required">*</span></label>
          <div class="input-wrap"><span class="input-icon">🧒</span>
            <input type="text" id="child_name" placeholder="Enter your child's full name" autocomplete="off">
          </div>
        </div>
        <div class="field-group">
          <label>Child's Roll Number <span class="required">*</span></label>
          <div class="input-wrap"><span class="input-icon">🔢</span>
            <input type="text" id="child_roll_number" placeholder="Must match existing roll number" autocomplete="off">
          </div>
        </div>
        <div class="field-row">
          <div class="field-group">
            <label>Child's Standard <span class="required">*</span></label>
            <div class="input-wrap select-wrap"><span class="input-icon">🏫</span>
              <select id="parent_standard">
                <option value="8th">8th Standard</option>
                <option value="9th">9th Standard</option>
                <option value="10th">10th Standard</option>
              </select>
            </div>
          </div>
          <div class="field-group">
            <label>Child's Section <span class="required">*</span></label>
            <div class="input-wrap select-wrap"><span class="input-icon">🔤</span>
              <select id="parent_section">
                <option value="A">Section A</option>
                <option value="B">Section B</option>
                <option value="C">Section C</option>
                <option value="D">Section D</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="field-group anim-field" style="--i:7">
        <label>Password <span class="required">*</span></label>
        <div class="input-wrap password-wrapper"><span class="input-icon">🔒</span>
          <input type="password" id="password" placeholder="Min 6 characters" autocomplete="new-password" required>
          <button type="button" class="eye-btn" onclick="togglePassword()">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
        <div id="strengthText" class="strength-text"></div>
      </div>

      <button type="submit" id="registerBtn" class="anim-field" style="--i:8">
        <span id="btnText">Create Account →</span>
        <span id="btnLoader" class="btn-loader" style="display:none;">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </span>
      </button>

      <div class="login-strip">Already have an account?&nbsp;<a href="/login_page">Login →</a></div>
    </form>
  </div>
</div>

<script>
const ROUTES = { student:"/student_dashboard", teacher:"/teacher_dashboard", parent:"/parent_dashboard" };
let detectedRole = null, existingDetected = false;

function selectRole(role) {
  document.getElementById("role").value = role;
  document.querySelectorAll(".role-tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`.role-tab[data-role="${role}"]`).classList.add("active");
  const sf = document.getElementById("studentFields");
  const pf = document.getElementById("parentFields");
  const pn = document.getElementById("parentNamesBlock");
  if (role === "student") { sf.style.display="block"; sf.classList.add("slide-in"); pf.style.display="none"; pn.style.display="grid"; }
  else if (role === "parent") { pf.style.display="block"; pf.classList.add("slide-in"); sf.style.display="none"; pn.style.display="none"; }
  else { sf.style.display="none"; pf.style.display="none"; pn.style.display="grid"; }
  tryCheckExisting();
}

function tryCheckExisting() {
  const name=document.getElementById("name").value.trim(), phone=document.getElementById("phone").value.trim(), email=document.getElementById("email").value.trim(), role=document.getElementById("role").value;
  if (name.length < 3 || phone.length !== 10 || isNaN(phone) || !email.includes("@")) return;
  const roll = role === "parent" ? (document.getElementById("child_roll_number")?.value.trim() || "") : "";
  if (role === "parent" && !roll) return;
  checkExisting(name, phone, email, role, roll);
}

["name","phone","email"].forEach(id => document.getElementById(id).addEventListener("blur", tryCheckExisting));
document.addEventListener("DOMContentLoaded", () => document.getElementById("child_roll_number")?.addEventListener("blur", tryCheckExisting));

async function checkExisting(name, phone, email, role, child_roll_number) {
  try {
    const r = await fetch("/check_existing", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({name,phone,email,role,child_roll_number}) });
    const d = await r.json();
    if (d.exists) {
      detectedRole=role; existingDetected=true;
      document.getElementById("existingName").innerText = d.name;
      document.getElementById("existingRole").innerText = "Role: " + role.charAt(0).toUpperCase()+role.slice(1);
      document.getElementById("existingAccountPopup").classList.add("open");
      setTimeout(()=>document.getElementById("dashboardBtn").focus(),100);
    }
  } catch(e) { console.warn(e); }
}

function closeExistingPopup() { document.getElementById("existingAccountPopup").classList.remove("open"); existingDetected=false; }
function goToDashboard() { window.location.href = ROUTES[detectedRole] || "/login_page"; }
document.addEventListener("keydown", e => { if (e.key==="Enter" && document.getElementById("existingAccountPopup").classList.contains("open")) { e.preventDefault(); goToDashboard(); } });

document.getElementById("password").addEventListener("input", function() {
  let s=0, v=this.value;
  if(v.length>=6)s++; if(v.length>=10)s++; if(/[A-Z]/.test(v))s++; if(/[0-9]/.test(v))s++; if(/[^A-Za-z0-9]/.test(v))s++;
  const L=[{w:"0%",c:"transparent",l:""},{w:"25%",c:"#ef4444",l:"Weak"},{w:"50%",c:"#f97316",l:"Fair"},{w:"75%",c:"#eab308",l:"Good"},{w:"100%",c:"#22c55e",l:"Strong"}];
  const l=L[Math.min(s,4)];
  document.getElementById("strengthFill").style.cssText=`width:${l.w};background:${l.c}`;
  const st=document.getElementById("strengthText"); st.textContent=l.l; st.style.color=l.c;
});

let pwVisible=false;
function togglePassword() {
  pwVisible=!pwVisible;
  document.getElementById("password").type=pwVisible?"text":"password";
  document.getElementById("eyeIcon").innerHTML=pwVisible
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

window.addEventListener("load", ()=>setTimeout(()=>{
  ["name","father_name","mother_name","phone","email","password","roll_number","child_name","child_roll_number"]
    .forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
},100));

function setLoading(on) {
  document.getElementById("btnText").style.display=on?"none":"inline";
  document.getElementById("btnLoader").style.display=on?"inline-flex":"none";
  document.getElementById("registerBtn").disabled=on;
}

function showToast(msg, type="error") {
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const b=document.createElement("div");
  b.className=`toast toast-${type}`; b.textContent=msg;
  document.body.appendChild(b);
  setTimeout(()=>b.classList.add("show"),10);
  setTimeout(()=>{b.classList.remove("show");setTimeout(()=>b.remove(),400);},4000);
}

document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  // Existing approved account detected
  if (existingDetected && detectedRole) { goToDashboard(); return; }

  const name=document.getElementById("name").value.trim();
  const phone=document.getElementById("phone").value.trim();
  const email=document.getElementById("email").value.trim();
  const role=document.getElementById("role").value;
  const password=document.getElementById("password").value;

  if (!name)                               { showToast("Please enter your full name.","error");            return; }
  if (phone.length!==10||isNaN(phone))     { showToast("Enter a valid 10-digit phone number.","error");   return; }
  if (!email)                              { showToast("Please enter your email.","error");                return; }
  if (password.length<6)                  { showToast("Password must be at least 6 characters.","error"); return; }
  if (role==="student"&&!document.getElementById("roll_number").value.trim()) { showToast("Please enter your roll number.","error"); return; }
  if (role==="parent") {
    if (!document.getElementById("child_name").value.trim())        { showToast("Please enter your child's name.","error");        return; }
    if (!document.getElementById("child_roll_number").value.trim()) { showToast("Please enter your child's roll number.","error"); return; }
  }

  setLoading(true);

  try {
    // STEP 1 — OTP
    const otpR = await fetch("/send-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone})});
    const otpD = await otpR.json();
    if (otpD.status !== "success") { showToast("Failed to send OTP: "+otpD.message,"error"); setLoading(false); return; }

    const otp = prompt("OTP: " + otpD.otp + "\n\nEnter the OTP to verify:");
    if (!otp) { setLoading(false); return; }

    // STEP 2 — Verify
    const vR = await fetch("/verify-otp",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({phone,otp})});
    const vD = await vR.json();
    if (vD.status !== "success") { showToast("❌ Invalid OTP. Please try again.","error"); setLoading(false); return; }

    // STEP 3 — Register
    const payload={name,phone,email,role,password};
    if (role==="student") {
      payload.father_name=document.getElementById("father_name").value.trim();
      payload.mother_name=document.getElementById("mother_name").value.trim();
      payload.roll_number=document.getElementById("roll_number").value.trim();
      payload.standard=document.getElementById("standard").value;
      payload.section=document.getElementById("section").value;
    } else if (role==="teacher") {
      payload.father_name=document.getElementById("father_name").value.trim();
      payload.mother_name=document.getElementById("mother_name").value.trim();
    } else if (role==="parent") {
      payload.child_name=document.getElementById("child_name").value.trim();
      payload.child_roll_number=document.getElementById("child_roll_number").value.trim();
      payload.parent_standard=document.getElementById("parent_standard").value;
      payload.parent_section=document.getElementById("parent_section").value;
    }

    const res  = await fetch("/register",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    const data = await res.json();

    if (data.status === "success") {
      // ✅ ONE SHOT — registered and logged in, go to dashboard
      showToast("✅ Registered! Taking you to your dashboard...","success");
      setTimeout(()=>{ window.location.href = ROUTES[data.role] || "/login_page"; }, 1200);
    } else {
      showToast(data.message || "Registration failed. Please try again.","error");
      setLoading(false);
    }

  } catch(err) {
    console.error(err);
    showToast("Server error. Please try again.","error");
    setLoading(false);
  }
});
</script>
</body>
