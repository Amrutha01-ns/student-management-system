<!DOCTYPE html>
<html>
<head>
    <title>SMS Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='loginstyle.css') }}">
</head>
<body>

<div class="login-container">
    <h2>Student Management System</h2>

    <form id="loginForm">
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p id="result"></p>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const phone = document.getElementById("phone").value;
    const password = document.getElementById("password").value;

    try {
        // ✅ CORRECT API CALL
        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                phone: phone,
                password: password
            })
        });

        const data = await response.json();

        console.log("Login Response:", data);

        if (data.status === "success") {

            // ✅ MAIN FIX (VERY IMPORTANT)
            localStorage.setItem("user_id", data.id);

            console.log("Saved ID:", data.id);

            if (data.role.toLowerCase() === "student") {
                window.location.href = "/student_dashboard";
            } 
            else if (data.role.toLowerCase() === "teacher") {
                window.location.href = "/teacher_dashboard";
            }
            else if (data.role.toLowerCase() === "parent") {
                window.location.href = "/parent_dashboard";
            }

        } else {
            alert("Login Failed ❌");
        }

    } catch (error) {
        console.log(error);
        alert("Server Error ❌");
    }
});
</script>

</body>
</html>
