<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | AET School</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f3f4f8;
  width: 100%;
  min-height: 100vh;
}

.wrapper {
  width: 100%;
  min-height: 100vh;
  background: #ffffff;
  display: flex;
  flex-direction: column;
}

.hdr {
  background: linear-gradient(135deg, #1e40af 0%, #2563eb 60%, #3b82f6 100%);
  padding: 50px 24px 36px;
  text-align: center;
}
.hdr-icon { font-size: 56px; display: block; margin-bottom: 14px; }
.hdr h1 {
  font-family: 'Playfair Display', serif;
  font-size: 30px;
  color: #ffffff;
  margin-bottom: 8px;
}
.hdr p { font-size: 14px; color: rgba(255,255,255,0.8); }
.hdr-line { width: 50px; height: 3px; background: rgba(255,255,255,0.4); border-radius: 2px; margin: 14px auto 0; }

.body {
  padding: 30px 20px 50px;
  flex: 1;
}

.role-label {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 12px;
  display: block;
}

.tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 28px;
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 8px;
  border: 2px solid #e0e0e0;
  border-radius: 14px;
  background: #fff;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: #888;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.tab .icon { font-size: 24px; }
.tab.on {
  border-color: #2563eb;
  background: #eff6ff;
  color: #2563eb;
}

.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #888;
  margin-bottom: 8px;
}
.inp-wrap { position: relative; }
.inp-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 18px;
  pointer-events: none;
  z-index: 1;
}
.inp-wrap input {
  width: 100%;
  height: 54px;
  padding: 0 16px 0 50px;
  border: 2px solid #e0e0e0;
  border-radius: 14px;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  color: #111;
  background: #fff;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.15s;
}
.inp-wrap input:focus { border-color: #2563eb; }
.inp-wrap input::placeholder { color: #bbb; }
.eye-btn {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  padding: 10px;
  color: #888;
  touch-action: manipulation;
}

.banner {
  display: none;
  gap: 14px;
  align-items: center;
  background: #f0fdf4;
  border: 2px solid #86efac;
  border-radius: 14px;
  padding: 14px 18px;
  margin-bottom: 20px;
}
.banner.show { display: flex; }
.b-avatar {
  width: 44px; height: 44px; min-width: 44px;
  border-radius: 50%;
  background: #2563eb;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.b-name { font-size: 16px; font-weight: 600; color: #111; }
.b-sub  { font-size: 13px; color: #15803d; margin-top: 2px; }

.pill {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 20px;
}
.pill.warn { display: flex; background: #fffbeb; border: 2px solid #fcd34d; color: #92400e; }

.forgot { text-align: right; margin-bottom: 20px; margin-top: -8px; }
.forgot a { font-size: 14px; color: #2563eb; font-weight: 500; cursor: pointer; text-decoration: none; }

.btn-login {
  width: 100%;
  height: 58px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-bottom: 10px;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-login:active { opacity: 0.85; }
.btn-login:disabled { opacity: 0.6; }

.dots { display: none; gap: 6px; align-items: center; }
.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #fff;
  animation: bop 1s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: .15s; }
.dot:nth-child(3) { animation-delay: .3s; }
@keyframes bop { 0%,80%,100%{transform:scale(0.6)} 40%{transform:scale(1)} }

.divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 24px 0 20px;
  color: #aaa;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e0e0e0; }

.reg-strip {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px;
  padding: 18px;
  background: #eff6ff;
  border: 2px solid #bfdbfe;
  border-radius: 14px;
  font-size: 16px;
  color: #333;
  text-align: center;
}
.reg-strip a { color: #2563eb; font-weight: 600; text-decoration: none; }

/* Toast */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #fff;
  border-radius: 14px;
  padding: 16px 24px;
  font-size: 15px;
  font-weight: 500;
  box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  z-index: 9999;
  opacity: 0;
  transition: all 0.3s ease;
  max-width: calc(100vw - 32px);
  text-align: center;
  word-break: break-word;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err  { color: #b91c1c; border: 2px solid #fca5a5; }
.toast.ok   { color: #15803d; border: 2px solid #86efac; }

/* Modal bottom sheet */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 9998;
  align-items: flex-end;
  justify-content: center;
}
.overlay.show { display: flex; }
.sheet {
  background: #fff;
  border-radius: 24px 24px 0 0;
  width: 100%;
  padding: 0 24px 48px;
  max-height: 92vh;
  overflow-y: auto;
  animation: sheetup 0.3s ease;
}
@keyframes sheetup { from { transform: translateY(100%); } to { transform: translateY(0); } }
.handle {
  width: 44px; height: 5px;
  background: #e0e0e0;
  border-radius: 3px;
  margin: 16px auto 24px;
}
.sheet h3 { font-size: 24px; font-weight: 700; color: #111; text-align: center; margin-bottom: 8px; }
.sheet p  { font-size: 15px; color: #888; text-align: center; margin-bottom: 22px; line-height: 1.5; }
.sheet-emoji { font-size: 52px; text-align: center; display: block; margin-bottom: 12px; }
.m-inp {
  width: 100%;
  height: 54px;
  padding: 0 16px;
  border: 2px solid #e0e0e0;
  border-radius: 14px;
  font-size: 16px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  margin-bottom: 14px;
  color: #111;
  background: #fff;
  -webkit-appearance: none;
  appearance: none;
}
.m-inp:focus { border-color: #2563eb; }
.m-btn {
  width: 100%;
  height: 54px;
  border: none;
  border-radius: 14px;
  background: linear-gradient(135deg, #1d4ed8, #3b82f6);
  color: #fff;
  font-size: 17px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-bottom: 14px;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
}
.m-btn:disabled { opacity: 0.6; }
.m-cancel {
  display: block;
  width: 100%;
  background: none;
  border: none;
  color: #888;
  font-size: 15px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  padding: 12px;
  text-align: center;
}
.step { display: none; }
.step.on { display: block; }
</style>
</head>
<body>

<!-- FORGOT PASSWORD MODAL -->
<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="sheet">
    <div class="handle"></div>

    <div class="step on" id="s1">
      <span class="sheet-emoji">🔑</span>
      <h3>Forgot Password</h3>
      <p>Enter your registered email to receive an OTP</p>
      <input class="m-inp" type="email" id="mEmail" placeholder="your@email.com" inputmode="email" autocomplete="email">
      <button class="m-btn" id="s1btn" onclick="sendOtp()">Send OTP</button>
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
    </div>

    <div class="step" id="s2">
      <span class="sheet-emoji">📋</span>
      <h3>Enter OTP</h3>
      <p id="otpHint">Check your email for the OTP</p>
      <input class="m-inp" type="text" id="mOtp" placeholder="6-digit OTP" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
      <button class="m-btn" onclick="verifyOtp()">Verify OTP</button>
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
    </div>

    <div class="step" id="s3">
      <span class="sheet-emoji">🔒</span>
      <h3>New Password</h3>
      <p>Enter your new password below</p>
      <input class="m-inp" type="password" id="mNew" placeholder="New password (min 6 chars)" autocomplete="new-password">
      <input class="m-inp" type="password" id="mCon" placeholder="Confirm new password" autocomplete="new-password">
      <button class="m-btn" id="s3btn" onclick="resetPass()">Reset Password</button>
      <button class="m-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- MAIN PAGE -->
<div class="wrapper">

  <div class="hdr">
    <span class="hdr-icon">🎓</span>
    <h1>Welcome Back</h1>
    <p>AET School of Excellence — Management System</p>
    <div class="hdr-line"></div>
  </div>

  <div class="body">

    <span class="role-label">I am a</span>
    <div class="tabs">
      <button class="tab on" data-r="student" onclick="setRole('student')">
        <span class="icon">🎒</span>Student
      </button>
      <button class="tab" data-r="teacher" onclick="setRole('teacher')">
        <span class="icon">📖</span>Teacher
      </button>
      <button class="tab" data-r="parent" onclick="setRole('parent')">
        <span class="icon">👨‍👩‍👦</span>Parent
      </button>
    </div>

    <div class="field">
      <label>Full Name</label>
      <div class="inp-wrap">
        <span class="inp-icon">👤</span>
        <input type="text" id="name" placeholder="Enter your full name" autocomplete="name">
      </div>
    </div>

    <div class="field">
      <label>Phone Number</label>
      <div class="inp-wrap">
        <span class="inp-icon">📱</span>
        <input type="tel" id="phone" placeholder="10-digit phone number" maxlength="10" inputmode="numeric" autocomplete="tel">
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <div class="inp-wrap">
        <span class="inp-icon">✉️</span>
        <input type="email" id="email" placeholder="Enter your email" inputmode="email" autocomplete="email">
      </div>
    </div>

    <div class="banner" id="banner">
      <div class="b-avatar">😊</div>
      <div>
        <div class="b-name" id="bName"></div>
        <div class="b-sub" id="bSub"></div>
      </div>
    </div>

    <div class="pill" id="pill">
      <span id="pillIcon"></span>
      <span id="pillText"></span>
    </div>

    <div class="field" id="pwdField" style="display:none">
      <label>Password</label>
      <div class="inp-wrap">
        <span class="inp-icon">🔒</span>
        <input type="password" id="pwd" placeholder="Enter your password" autocomplete="current-password">
        <button class="eye-btn" type="button" onclick="toggleEye()">
          <svg id="eyesvg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot" id="forgotDiv" style="display:none">
      <a onclick="openModal()">Forgot password?</a>
    </div>

    <button class="btn-login" id="loginBtn" onclick="doLogin()">
      <span id="btnLabel">Go to My Dashboard →</span>
      <span class="dots" id="btnDots">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </span>
    </button>

    <div class="divider">OR</div>

    <div class="reg-strip">
      Don't have an account?&nbsp;<a href="/register">Register here →</a>
    </div>

  </div>
</div>

<script>
let role = 'student', found = null, timer = null, otpCode = null;

function setRole(r) {
  role = r;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('on', t.dataset.r === r));
  found = null; hideBanner(); hidePill(); hidePwd();
  check();
}

['name','phone','email'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    clearTimeout(timer); timer = setTimeout(check, 600);
  });
});

function ready() {
  const n=g('name'), p=g('phone'), e=g('email');
  return n.length>=2 && p.length===10 && /^\d+$/.test(p) && e.includes('@') && e.includes('.');
}

async function check() {
  hideBanner(); hidePill(); hidePwd(); found = null;
  if (!ready()) return;
  try {
    const r = await fetch('/check_existing', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name:g('name'), phone:g('phone'), email:g('email'), role, child_roll_number:''})
    });
    const d = await r.json();
    if (d.exists) {
      found = d.name;
      showBanner(d.name);
      showPwd();
    } else {
      showPill('⚠️', 'No account found. Please register below.');
    }
  } catch(e) { console.warn(e); }
}

function showBanner(name) {
  document.getElementById('bName').textContent = name;
  const lbl = {student:'🎒 Student account', teacher:'📖 Teacher account', parent:'👨‍👩‍👦 Parent account'};
  document.getElementById('bSub').textContent = '✓ ' + (lbl[role]||'Account found') + ' — enter your password';
  document.getElementById('banner').classList.add('show');
}
function hideBanner() { document.getElementById('banner').classList.remove('show'); }

function showPill(icon, msg) {
  document.getElementById('pillIcon').textContent = icon;
  document.getElementById('pillText').textContent = msg;
  document.getElementById('pill').className = 'pill warn';
}
function hidePill() { document.getElementById('pill').className = 'pill'; }

function showPwd() {
  document.getElementById('pwdField').style.display = 'block';
  document.getElementById('forgotDiv').style.display = 'block';
  setTimeout(() => document.getElementById('pwd').focus(), 150);
}
function hidePwd() {
  document.getElementById('pwdField').style.display = 'none';
  document.getElementById('forgotDiv').style.display = 'none';
  document.getElementById('pwd').value = '';
}

let eyeOn = false;
function toggleEye() {
  eyeOn = !eyeOn;
  document.getElementById('pwd').type = eyeOn ? 'text' : 'password';
  document.getElementById('eyesvg').innerHTML = eyeOn
    ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
    : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
}

async function doLogin() {
  if (!ready()) { toast('Please fill all fields correctly.', 'err'); return; }
  if (!found) {
    await check();
    if (!found) {
      toast('No account found. Redirecting to register...', 'err');
      setTimeout(() => location.href='/register', 1800);
      return;
    }
  }
  const pwd = g('pwd');
  if (!pwd) { toast('Please enter your password.', 'err'); return; }
  loading(true);
  try {
    const r = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({name:g('name'), phone:g('phone'), email:g('email'), role, password:pwd})
    });
    const d = await r.json();
    if (d.status === 'success') {
      toast('✅ Login successful! Redirecting...', 'ok');
      setTimeout(() => {
        if      (d.role==='student') location.href='/student_dashboard';
        else if (d.role==='teacher') location.href='/teacher_dashboard';
        else if (d.role==='parent')  location.href='/parent_dashboard';
        else                         location.href='/admin_dashboard';
      }, 1000);
    } else {
      toast(d.message || 'Login failed.', 'err');
      loading(false);
    }
  } catch(e) {
    toast('Server error. Try again.', 'err');
    loading(false);
  }
}

function loading(on) {
  document.getElementById('btnLabel').style.display = on ? 'none' : 'block';
  document.getElementById('btnDots').style.display  = on ? 'flex' : 'none';
  document.getElementById('loginBtn').disabled = on;
}

function openModal() {
  document.getElementById('mEmail').value = g('email');
  document.getElementById('mOtp').value = '';
  document.getElementById('mNew').value = '';
  document.getElementById('mCon').value = '';
  otpCode = null;
  goStep(1);
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
function goStep(n) {
  document.querySelectorAll('.step').forEach((s,i) => s.classList.toggle('on', i+1===n));
}

async function sendOtp() {
  const email = document.getElementById('mEmail').value.trim();
  if (!email) { toast('Enter your email.', 'err'); return; }
  const b = document.getElementById('s1btn');
  b.disabled = true; b.textContent = 'Sending...';
  try {
    const r = await fetch('/send-otp', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email})
    });
    const d = await r.json();
    b.disabled = false; b.textContent = 'Send OTP';
    if (d.status === 'success') {
      otpCode = String(d.otp);
      document.getElementById('otpHint').textContent = '🔢 Your OTP: ' + d.otp;
      goStep(2);
    } else { toast('Failed to send OTP.', 'err'); }
  } catch(e) { b.disabled=false; b.textContent='Send OTP'; toast('Server error.','err'); }
}

function verifyOtp() {
  const entered = document.getElementById('mOtp').value.trim();
  if (!entered) { toast('Enter the OTP.', 'err'); return; }
  if (entered !== otpCode) { toast('❌ Wrong OTP. Try again.', 'err'); return; }
  goStep(3);
}

async function resetPass() {
  const email = document.getElementById('mEmail').value.trim();
  const np    = document.getElementById('mNew').value;
  const cp    = document.getElementById('mCon').value;
  if (np.length < 6)  { toast('Minimum 6 characters.', 'err'); return; }
  if (np !== cp)      { toast('Passwords do not match.', 'err'); return; }
  const b = document.getElementById('s3btn');
  b.disabled = true; b.textContent = 'Resetting...';
  try {
    const r = await fetch('/reset_password', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, new_password: np})
    });
    const d = await r.json();
    b.disabled = false; b.textContent = 'Reset Password';
    if (d.status === 'success') { toast('✅ Password reset! Login now.', 'ok'); closeModal(); }
    else { toast(d.message || 'Reset failed.', 'err'); }
  } catch(e) { b.disabled=false; b.textContent='Reset Password'; toast('Server error.','err'); }
}

function g(id) { return document.getElementById(id).value.trim(); }

function toast(msg, type) {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3500);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') {
    if (document.getElementById('modal').classList.contains('show')) return;
    doLogin();
  }
});
</script>
</body>
</html>
